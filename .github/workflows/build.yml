name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace
      - name: Test workspace
        run: cargo test --workspace -- --nocapture

  desktop-ts:
    name: Desktop TypeScript (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Typecheck desktop
        run: npm run build -w neuro-connect
      - name: Typecheck web
        run: npm run build -w neuro-connect-web

  packaging-notes:
    name: Packaging docs present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check packaging docs
        run: |
          test -f docs/LINUX_DIST.md
          test -f docs/MACOS.md
          test -f docs/FEATURE_MATRIX.md
          test -f requirements/macos.md
          test -f scripts/build-client.sh
